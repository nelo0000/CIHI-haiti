<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CIHI Webinar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>CIHI Webinar</h1>
  <p>Access fee: $15</p>

  <form id="contactForm" onsubmit="handleFormSubmit(event)">

    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Phone" required>
    <input type="text" placeholder="Country" required>

    <select id="interestSelect">
      <option value="land">Land Investment</option>
      <option value="crypto">Crypto / Blockchain</option>
      <option value="general">General Info</option>
    </select>

    <button type="submit">Join Webinar</button>
  </form>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz1RvboibQekwt5zHHQmL3qLbpb8nczyCh9NP1Ev_UhZw1-pmIN_DcgsM45L4xY1Ibb7w/exec";

function handleFormSubmit(e) {
    e.preventDefault();

    const form = e.target;

    const data = {
        name: form.querySelectorAll("input")[0].value,
        email: form.querySelectorAll("input")[1].value,
        phone: form.querySelectorAll("input")[2].value,
        country: form.querySelectorAll("input")[3].value,
        interest: document.getElementById("interestSelect").value
    };

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        form.innerHTML = `
            <h2>You're in 🚀</h2>
            <p>We received your registration. Check your email soon.</p>
        `;
    })
    .catch(() => {
        alert("Error sending data. Try again.");
    });
}
</script>

</body>
</html>
